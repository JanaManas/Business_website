<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - TechCorp</title>
  <link rel="stylesheet" href="style1.css">
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>

<header>
  <nav>
    <h1>TechCorp</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<section class="contact-container">

  <!-- Left Side Info -->
  <div class="contact-info">
    <h2>Get in Touch</h2>
    <p>We would love to hear from you. Fill out the form or contact us directly.</p>

    <p><strong>📍 Address:</strong> Kolkata, India</p>
    <p><strong>📧 Email:</strong> support@techcorp.com</p>
    <p><strong>📞 Phone:</strong> +91 9876543210</p>
  </div>

  <!-- Right Side Form -->
  <div class="contact-form">
    <form onsubmit="return validateForm()">
      <input type="text" id="name" placeholder="Full Name">
      <input type="email" id="email" placeholder="Email Address">
      <textarea id="message" placeholder="Your Message"></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>

</section>

<footer>
  <p>© 2026 TechCorp Solutions</p>
</footer>

</body>
</html>
